apiVersion: openporch/v1alpha1
kind: Application
metadata:
  name: fastapi-demo
  project: demo
workloads:
  api:
    type: workload
    params:
      image: fastapi-demo:local
      host_port: 8080
      container_port: 8080
      env:
        DATABASE_URL: ${resources.db.outputs.url}
    resources:
      db:
        type: postgres
        params:
          size: small
outputs:
  api_url: ${workloads.api.outputs.url}
