name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Verify modules
        run: go mod verify

      - name: Build
        run: go build ./...

      - name: Vet
        run: go vet ./...

      - name: Unit tests
        run: go test -race ./...

  integration-test:
    name: Integration tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up OpenTofu
        uses: opentofu/setup-opentofu@v1
        with:
          tofu_wrapper: false

      - name: Verify Docker daemon
        run: |
          docker version
          docker info

      - name: Integration tests
        id: integration
        run: go test -tags=integration -timeout=10m -v ./...

      - name: Dump container state on failure
        if: failure() && steps.integration.outcome == 'failure'
        run: |
          echo "=== docker ps -a ==="
          docker ps -a || true
          for c in $(docker ps -aq --filter "label=openporch.managed=true"); do
            echo "=== docker logs $c ==="
            docker logs --tail=200 "$c" || true
          done
